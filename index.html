<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mbox File Viewer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📧 Mbox File Viewer</h1>
        </header>

        <div class="file-input-section">
            <input type="file" id="mboxFile" />
            <label for="mboxFile" class="file-label">Choose Mbox File</label>
            <div class="file-info" id="fileInfo"></div>
        </div>

        <div class="search-section" id="searchSection">
            <button type="button" class="search-toggle" id="searchToggle" aria-expanded="true">
                <span>Search &amp; filters</span>
                <span class="search-toggle-icon" aria-hidden="true">▾</span>
            </button>
            <div class="search-body">
                <div class="search-controls">
                    <input type="text" id="searchInput" placeholder="Search emails…" />
                    <input type="text" id="senderFilter" placeholder="From contains…" />
                    <select id="labelFilter" title="Filter by Gmail label">
                        <option value="">All labels</option>
                    </select>
                </div>
                <div class="search-actions">
                    <label class="filter-date">From <input type="date" id="dateFrom" /></label>
                    <label class="filter-date">To <input type="date" id="dateTo" /></label>
                    <button id="searchBtn">Search</button>
                    <button id="clearBtn">Clear</button>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="email-list" id="emailList">
                <div class="no-file-message">
                    Select an mbox file to view your emails
                </div>
            </div>

            <div class="email-viewer" id="emailViewer">
                <div class="no-email-selected">
                    Select an email from the list to view its content
                </div>
            </div>
        </div>

        <div class="stats" id="stats"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
